<!DOCTYPE html>
<html lang="sw">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Ramani za Mavurunza | Mfumo wa Upakuaji</title>
	<style>
		/* 1. RANGI NA VARIABLES */
		:root {
	--primary-color: #2c3e50;	
	--accent-color: #27ae60;
	--secondary-color: #2980b9;
	--bg-color: #f4f7f6;
	--card-bg: #ffffff;
	--text-color: #333333;
	--shadow: 0 4px 6px rgba(0,0,0,0.1);
		}

		/* Dark Mode Colors */
		[data-theme="dark"] {
	--primary-color: #1a1a1a;
	--accent-color: #2ecc71;
	--secondary-color: #3498db;
	--bg-color: #121212;
	--card-bg: #1e1e1e;
	--text-color: #e0e0e0;
	--shadow: 0 4px 10px rgba(0,0,0,0.5);
		}

		/* 2. MUONEKANO WA JUMLA */
		body {
	font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
	background-color: var(--bg-color);
	color: var(--text-color);
	margin: 0;
	padding: 20px;
	transition: background-color 0.3s, color 0.3s;
		}

		.container {
	max-width: 1100px;
	margin: 0 auto;
		}

		header {
	text-align: center;
	padding: 30px;
	background: var(--primary-color);
	color: white;
	border-radius: 12px;
	margin-bottom: 30px;
	box-shadow: var(--shadow);
		}

		/* 3. THEME SWITCHER */
		.theme-switch-wrapper {
	display: flex;
	justify-content: flex-end;
	align-items: center;
	margin-bottom: 20px;
		}

		.theme-switch {
	display: inline-block;
	height: 34px;
	position: relative;
	width: 110px;
		}

		.theme-switch input { display:none; }

		.slider {
	background-color: #ccc;
	bottom: 0;
	cursor: pointer;
	left: 0;
	position: absolute;
	right: 0;
	top: 0;
	transition: .4s;
	border-radius: 34px;
	display: flex;
	align-items: center;
	justify-content: center;
		}

		.slider:before {
	background-color: #fff;
	bottom: 4px;
	content: "";
	height: 26px;
	left: 4px;
	position: absolute;
	transition: .4s;
	width: 26px;
	border-radius: 50%;
	z-index: 2;
		}

		input:checked + .slider { background-color: var(--accent-color); }
		input:checked + .slider:before { transform: translateX(76px); }

		.mode-text {
	font-size: 12px;
	font-weight: bold;
	color: white;
	margin-left: 15px;
	z-index: 1;
		}

		/* 4. SEARCH BAR */
		#searchBar {
	width: 100%;
	padding: 15px;
	margin-bottom: 30px;
	border: 2px solid #ddd;
	border-radius: 10px;
	font-size: 16px;
	background: var(--card-bg);
	color: var(--text-color);
	box-sizing: border-box;
	transition: 0.3s;
		}

		#searchBar:focus {
	outline: none;
	border-color: var(--accent-color);
	box-shadow: 0 0 8px rgba(39, 174, 96, 0.3);
		}

		/* 5. GRID NA KADI ZA RAMANI */
		.map-grid {
	display: grid;
	grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
	gap: 25px;
		}

		.map-card {
	background: var(--card-bg);
	padding: 25px;
	border-radius: 15px;
	border-bottom:5px solid var(--secondary-color);
	border-right:5px solid var(--secondary-color);
	border-left:5px solid var(--secondary-color);
	box-shadow: var(--shadow);
	border-top: 5px solid var(--secondary-color);
	display: flex;
	flex-direction: column;
	align-items: center;
	/* Kwa ajili ya Scroll Reveal */
	opacity: 0;
	transform: translateY(30px);
	transition: all 0.5s ease-out;
		}

		.map-card.show {
	opacity: 1;
	transform: translateY(0);
		}

		.map-card h3 {
	margin: 0 0 20px 0;
	font-size: 22px;
	font-family: "MS PGothic" solid;
		}

		.btn-group {
	display: flex;
	gap: 12px;
	width: 100%;
		}

		.btn {
	flex: 1;
	padding: 12px 5px;
	border: none;
	border-radius: 8px;
	cursor: pointer;
	font-weight: bold;
	text-decoration: none;
	text-align: center;
	font-size: 13px;
	transition: transform 0.2s, opacity 0.2s;
		}

		.btn-kml { background-color: var(--secondary-color); color: white; }
		.btn-img { background-color: var(--accent-color); color: white; }

		.btn:active { transform: scale(0.95); }
		.btn:hover { opacity: 0.85; }

		/* Responsive */
		@media (max-width: 600px) {
	.btn-group { flex-direction: column; }
		}
	</style>
</head>
<body>

<div class="container">
	<div class="theme-switch-wrapper">
		<label class="theme-switch" for="checkbox">
	<input type="checkbox" id="checkbox" />
	<div class="slider round">
		<span class="mode-text">NURU</span>
	</div>
		</label>
	</div>

	<header>
		<h1>Ramani ya Kutaniko la Mavurunza</h1>
		<p>Pakua ramani za mahubiri kwa urahisi (kml na Picha)</p>
	</header>

	<input type="text" id="searchBar" placeholder="Tafuta namba ya ramani (mfano: R005)..." onkeyup="filterMaps()">

	<div class="map-grid" id="mapContainer">
		</div>
</div>

<script>
	const mapContainer = document.getElementById('mapContainer');
	const toggleSwitch = document.querySelector('.theme-switch input[type="checkbox"]');
	const modeText = document.querySelector('.mode-text');

	// 1. ZALISHA RAMANI 100
	function generateMaps() {
		for (let i = 1; i <= 100; i++) {
	const mapId = "R-" + i.toString().padStart(3, '0');
	
	const card = document.createElement('div');
	card.className = 'map-card';
	card.innerHTML = `
		<h3>Ramani ${mapId}</h3>
		<div class="btn-group">
			<a href="maps/${mapId}.kml" class="btn btn-kml" download>Pakua ramani(kml)</a>
			<a href="images/${mapId}.jpg" class="btn btn-img" download>Pakua Picha</a>
		</div>
	`;
	mapContainer.appendChild(card);
		}
		// Anza kuonyesha kadi baada ya kuzitengeneza
		setTimeout(handleScroll, 100);
	}

	// 2. TAFUTA RAMANI (FILTER)
	function filterMaps() {
		const input = document.getElementById('searchBar').value.toUpperCase();
		const cards = document.getElementsByClassName('map-card');

		for (let i = 0; i < cards.length; i++) {
	const title = cards[i].getElementsByTagName('h3')[0].innerText;
	if (title.toUpperCase().indexOf(input) > -1) {
		cards[i].style.display = "";
		cards[i].classList.add('show'); // Hakikisha inaonekana
	} else {
		cards[i].style.display = "none";
	}
		}
	}

	// 3. MFUMO WA RANGI (THEME)
	function switchTheme(e) {
		if (e.target.checked) {
	document.documentElement.setAttribute('data-theme', 'dark');
	localStorage.setItem('theme', 'dark');
	modeText.innerText = "GIZA";
		} else {
	document.documentElement.setAttribute('data-theme', 'light');
	localStorage.setItem('theme', 'light');
	modeText.innerText = "NURU";
		}	
	}

	toggleSwitch.addEventListener('change', switchTheme);

	// Angalia kama mtumiaji alishawahi kuchagua rangi awali
	const savedTheme = localStorage.getItem('theme');
	if (savedTheme) {
		document.documentElement.setAttribute('data-theme', savedTheme);
		if (savedTheme === 'dark') {
	toggleSwitch.checked = true;
	modeText.innerText = "GIZA";
		}
	}

	// 4. SCROLL ANIMATION (REVEAL)
	function handleScroll() {
		const cards = document.querySelectorAll('.map-card');
		const triggerBottom = window.innerHeight * 0.9;

		cards.forEach(card => {
	const cardTop = card.getBoundingClientRect().top;
	if (cardTop < triggerBottom) {
		card.classList.add('show');
	}
		});
	}

	window.addEventListener('scroll', handleScroll);
	
	// Anzisha mfumo
	generateMaps();
</script>

</body>
</html>
